<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Intermediate</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- 3. Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MySite</a>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- 1 & 5. 3-column responsive layout -->
        <div class="row">

            <!-- Column 1 -->
            <div class="col-12 col-md-6 col-lg-4">
                
                <!-- 2. Profile Card -->
                <div class="card mb-4">
                    <img src="pic1.png" class="card-img-top">

                    <div class="card-body text-center">
                        <h5 class="card-title">Deekshith</h5>
                        <p class="card-text">Python Developer</p>
                        <a href="#" class="btn btn-primary">View</a>
                    </div>
                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card mb-4">
                    <img src="pic1.png" class="card-img-top">

                    <div class="card-body text-center">
                        <h5 class="card-title">Farhan</h5>
                        <p class="card-text">Data Analyst</p>
                        <a href="#" class="btn btn-success">View</a>
                    </div>
                </div>
            </div>

            <!-- Column 3 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card mb-4">
                    <img src="pic1.png" class="card-img-top">

                    <div class="card-body text-center">
                        <h5 class="card-title">Shamanth</h5>
                        <p class="card-text">Web Developer</p>
                        <a href="#" class="btn btn-danger">View</a>
                    </div>
                </div>
            </div>

        </div>

        <!-- 4. Bootstrap Form -->
        <h2 class="mt-5">Contact Form</h2>

        <form class="mt-3">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

    </div>

</body>
</html>
