<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Basic Tasks</title>

    <!-- 1. Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- 2. Container -->
    <div class="container mt-5">

        <h1 class="text-center">Bootstrap Basics</h1>

        <!-- 3. Bootstrap Button -->
        <button class="btn btn-primary mt-3">Click Me</button>

        <!-- 4. Margin & Padding -->
        <div class="mt-4 p-3 bg-light">
            This box has margin (mt-4) and padding (p-3)
        </div>

        <!-- 5. Bootstrap Card -->
        <div class="card mt-4" style="width: 18rem;">
            <img src="pic1.png" class="card-img-top" alt="Image">
            
            <div class="card-body">
                <h5 class="card-title">Profile Card</h5>
                <p class="card-text">This is a simple Bootstrap card.</p>
                <a href="#" class="btn btn-success">View Profile</a>
            </div>
        </div>

    </div>

</body>
</html>
