<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Advanced Tasks</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 5. Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card:hover {
            transform: scale(1.03);
            transition: 0.3s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .pricing-card {
            border-radius: 15px;
        }

        .sidebar {
            background: #343a40;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- 2. Dashboard Layout -->
    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-12 col-md-3 col-lg-2 sidebar">
                <h4>Dashboard</h4>
                <p>Home</p>
                <p>Profile</p>
                <p>Settings</p>
            </div>

            <!-- Main Content -->
            <div class="col p-4">

                <!-- 1. Responsive Card Layout -->
                <h2 class="text-center mb-4">Profile Cards</h2>

                <div class="row g-4">

                    <!-- Card -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card text-center p-3">
                            <h5>Deekshith</h5>
                            <p>Python Developer</p>
                            <button class="btn btn-primary">View</button>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card text-center p-3">
                            <h5>Farhan</h5>
                            <p>Data Analyst</p>
                            <button class="btn btn-success">View</button>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card text-center p-3">
                            <h5>Shamanth</h5>
                            <p>Web Developer</p>
                            <button class="btn btn-danger">View</button>
                        </div>
                    </div>

                </div>

                <!-- 3. Utilities: Align + Center + Space -->
                <div class="d-flex justify-content-center align-items-center gap-3 mt-5">
                    <button class="btn btn-outline-primary">One</button>
                    <button class="btn btn-outline-secondary">Two</button>
                    <button class="btn btn-outline-success">Three</button>
                </div>

                <!-- 4. Pricing Section -->
                <h2 class="text-center mt-5">Pricing Plans</h2>

                <div class="row g-4 mt-3 text-center">

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card pricing-card p-4">
                            <h4>Basic</h4>
                            <h2>$10</h2>
                            <p>1 Project</p>
                            <p>Email Support</p>
                            <button class="btn btn-primary">Choose</button>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card pricing-card p-4">
                            <h4>Standard</h4>
                            <h2>$20</h2>
                            <p>5 Projects</p>
                            <p>Priority Support</p>
                            <button class="btn btn-success">Choose</button>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card pricing-card p-4">
                            <h4>Premium</h4>
                            <h2>$30</h2>
                            <p>Unlimited Projects</p>
                            <p>24/7 Support</p>
                            <button class="btn btn-danger">Choose</button>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>

</body>
</html>
