<!DOCTYPE html>
<html>
<head>
    <title>Intern Profile Page</title>
</head>
<body>

    <!-- Main Section -->
    <section>

        <h1>Intern Profiles</h1>

        <!-- 2. Three Profile Cards -->
        <div>

            <!-- 1. Profile Card -->
            <div>
                <h2>Intern Profile Card</h2>
                <img src="https://via.placeholder.com/100" alt="Profile Image">

                <p><strong>Name:</strong> Deekshith N</p>
                <p><strong>Role:</strong> Python Developer</p>

                <button>View Profile</button>
            </div>

            <hr>

            <!-- Card 2 -->
            <div>
                <img src="https://via.placeholder.com/100" alt="Profile Image">

                <p><strong>Name:</strong> Farhan</p>
                <p><strong>Role:</strong> Data Analyst</p>

                <button>View Profile</button>
            </div>

            <hr>

            <!-- Card 3 -->
            <div>
                <img src="https://via.placeholder.com/100" alt="Profile Image">

                <p><strong>Name:</strong> Shamanth</p>
                <p><strong>Role:</strong> Web Developer</p>

                <button>View Profile</button>
            </div>

        </div>

    </section>

    <hr>

    <!-- Form Section -->
    <section>

        <h1>Intern Registration Form</h1>

        <!-- 3. Form -->
        <form>

            <!-- 4. Proper Labels -->

            <div>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name">
            </div>

            <br>

            <div>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email">
            </div>

            <br>

            <div>
                <label for="role">Select Role:</label><br>
                <select id="role" name="role">
                    <option value="">--Select--</option>
                    <option>Python Developer</option>
                    <option>Data Analyst</option>
                    <option>Web Developer</option>
                </select>
            </div>

            <br>

            <div>
                <label for="agree">Accept Terms:</label>
                <input type="checkbox" id="agree" name="agree">
            </div>

            <br>

            <button type="submit">Submit</button>

        </form>

    </section>

</body>
</html>
