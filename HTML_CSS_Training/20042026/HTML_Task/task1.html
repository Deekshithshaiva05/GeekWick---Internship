<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Tasks</title>
</head>
<body>

    <!-- 4. Div to group content -->
    <div>

        <!-- 1. Heading -->
        <h1>Welcome to My Web Page</h1>

        <!-- 1. Paragraph -->
        <p>This is a simple HTML page demonstrating basic tasks.</p>

        <!-- 1. Button -->
        <button>Click Me</button>

        <br><br>

        <!-- 2. Image -->
        <img src="https://via.placeholder.com/150" alt="Sample Image">

        <br><br>

        <!-- 3. Link to Google -->
        <a href="https://www.google.com" target="_blank">
            Go to Google
        </a>

        <br><br>

        <!-- 5. Unordered List -->
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>

    </div>

</body>
</html>
